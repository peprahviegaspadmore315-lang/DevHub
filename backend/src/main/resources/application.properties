# ===========================================
# Learning Platform - Application Properties
# ===========================================
# This file contains default values
# Environment-specific settings should go in application.yml
# Sensitive values MUST be set via environment variables

# Application Name
spring.application.name=learning-platform

# Server Configuration
server.port=8080

# ===========================================
# IMPORTANT: Security Notice
# ===========================================
# All sensitive configuration MUST be set via environment variables:
#
# Required Environment Variables:
# - JWT_SECRET: Your JWT signing secret (min 256 bits)
# - GEMINI_API_KEY: Your Google Gemini API key
# - DB_PASSWORD: Your database password
#
# Optional Environment Variables:
# - DB_URL, DB_USERNAME: Database connection
# - OPENAI_API_KEY: OpenAI API key (alternative to Gemini)
# - REDIS_HOST, REDIS_PASSWORD: Redis connection
# - CORS_ALLOWED_ORIGINS: Allowed frontend origins
#
# NEVER hardcode sensitive values in this file!
# NEVER commit .env files to version control!
# ===========================================
