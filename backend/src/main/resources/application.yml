server:
  port: 8080

spring:
  application:
    name: learning-platform
  
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/learning_platform}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSS'Z'
    time-zone: UTC

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 60000ms

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

app:
  jwt:
    secret: ${JWT_SECRET:YourSuperSecretKeyForJWTTokenGeneration123456789}
    access-token-expiration: 3600000
    refresh-token-expiration: 86400000

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

  ai:
    enabled: ${AI_ENABLED:true}
    provider: gemini
    open-ai-url: ${AI_OPENAI_URL:https://api.openai.com/v1/chat/completions}
    open-ai-api-key: ${OPENAI_API_KEY:}
    gemini:
      enabled: ${GEMINI_ENABLED:true}
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-1.5-flash}
      base-url: https://generativelanguage.googleapis.com/v1beta/models
      max-tokens: 2048
      temperature: 0.9
      top-p: 1.0
      top-k: 40
      fallback-responses: ${AI_FALLBACK_ENABLED:true}
    model: ${AI_MODEL:gpt-3.5-turbo}
    max-tokens: 1000
    temperature: 0.7
    rate-limit-per-minute: 10

  execution:
    timeout-seconds: 10
    max-memory-mb: 256
    max-output-size: 65536
    workspace-path: /tmp/execution
    docker:
      enabled: ${DOCKER_ENABLED:true}
      host: ${DOCKER_HOST:unix:///var/run/docker.sock}

  code-execution:
    enabled: ${CODE_EXECUTION_ENABLED:true}
    docker:
      enabled: ${DOCKER_ENABLED:true}
      socket-path: ${DOCKER_HOST:unix:///var/run/docker.sock}
      container-timeout-ms: 15000
    limits:
      timeout-seconds: 10
      max-memory-mb: 256
      max-output-bytes: 65536
      max-code-bytes: 102400
    security:
      enabled: true
      block-network: true
      block-file-system: true
      block-system-commands: true
    workspace-path: ${CODE_EXECUTION_PATH:/tmp/code-execution}

logging:
  level:
    root: INFO
    com.learningplatform: DEBUG
    org.springframework.security: DEBUG

---
spring:
  config:
    activate:
      on-profile: gemini

app:
  ai:
    provider: gemini
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: gemini-1.5-flash
