server:
  port: 8080

spring:
  config:
    import: optional:configtree:/etc/secrets/
  application:
    name: learning-platform

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          connectiontimeout: ${MAIL_CONNECTION_TIMEOUT:10000}
          timeout: ${MAIL_TIMEOUT:10000}
          starttls:
            enable: true
          writetimeout: ${MAIL_WRITE_TIMEOUT:10000}

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSS'Z'
    time-zone: UTC

app:
  jwt:
    secret: ${JWT_SECRET:YourSuperSecretKeyForJWTTokenGeneration123456789}
    access-token-expiration: 3600000
    refresh-token-expiration: 86400000
  bootstrap-admin-secret: ${BOOTSTRAP_ADMIN_SECRET:bootstrap-secret-change-in-production}

  auth:
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5174}
    password-reset-token-expiration-minutes: ${PASSWORD_RESET_TOKEN_EXPIRATION_MINUTES:30}
    password-reset-code-length: ${PASSWORD_RESET_CODE_LENGTH:6}

  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:}}

  feedback:
    recipient: ${FEEDBACK_RECIPIENT:${MAIL_FROM:${MAIL_USERNAME:}}}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}

  ai:
    enabled: ${AI_ENABLED:true}
    provider: ${AI_PROVIDER:gemini}
    open-ai-url: ${AI_OPENAI_URL:https://api.openai.com/v1/responses}
    open-ai-api-key: ${OPENAI_API_KEY:dummy-openai-key}
    gemini:
      enabled: ${GEMINI_ENABLED:true}
      api-key: ${GEMINI_API_KEY:dummy-gemini-key-for-development}
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/models}
      model: ${GEMINI_MODEL:gemini-2.5-flash}
      max-tokens: 2048
      temperature: 0.9
      top-p: 1.0
      top-k: 40
    model: ${AI_MODEL:gpt-5.4}
    max-tokens: 1000
    temperature: 0.7
    rate-limit-per-minute: 10

logging:
  level:
    root: INFO
    com.learningplatform: DEBUG
    org.springframework.security: DEBUG
