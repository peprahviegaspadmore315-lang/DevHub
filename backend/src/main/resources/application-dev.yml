server:
  port: 9090

spring:
  application:
    name: learning-platform

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  
  datasource:
    url: jdbc:h2:file:./data/learningdb;AUTO_SERVER=TRUE;MODE=PostgreSQL
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false
  
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSS'Z'
    time-zone: UTC

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  main:
    allow-bean-definition-overriding: true

app:
  jwt:
    secret: ${JWT_SECRET:YourSuperSecretKeyForJWTTokenGeneration123456789}
    access-token-expiration: 3600000
    refresh-token-expiration: 86400000

  ai:
    enabled: true
    provider: ${AI_PROVIDER:gemini}

  auth:
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5174}
    password-reset-token-expiration-minutes: ${PASSWORD_RESET_TOKEN_EXPIRATION_MINUTES:30}
    password-reset-code-length: ${PASSWORD_RESET_CODE_LENGTH:6}

  cors:
    allowed-origins: http://localhost:*,http://127.0.0.1:*

  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:}}

  code-execution:
    workspace-path: ${java.io.tmpdir}/workspace
    limits:
      timeout-seconds: 10
      max-memory-mb: 256
      max-output-bytes: 65536
    docker:
      enabled: false

logging:
  level:
    root: INFO
    com.learningplatform: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
