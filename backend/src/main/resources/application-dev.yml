server:
  port: 8082

spring:
  application:
    name: learning-platform
  
  datasource:
    url: jdbc:h2:mem:learningdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false
  
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSS'Z'
    time-zone: UTC

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  main:
    allow-bean-definition-overriding: true

app:
  jwt:
    secret: ${JWT_SECRET:YourSuperSecretKeyForJWTTokenGeneration123456789}
    access-token-expiration: 3600000

  ai:
    enabled: true
    provider: gemini
    gemini:
      enabled: true
      api-key: ${GEMINI_API_KEY:}
      model: gemini-pro
      base-url: https://generativelanguage.googleapis.com/v1beta/models
      max-tokens: 2048
      temperature: 0.9
      top-p: 1.0
      top-k: 40
    refresh-token-expiration: 86400000

  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000

  execution:
    timeout-seconds: 10
    max-memory-mb: 256
    max-output-size: 65536
    workspace-path: ${java.io.tmpdir}/workspace
    docker:
      enabled: false

logging:
  level:
    root: INFO
    com.learningplatform: INFO
