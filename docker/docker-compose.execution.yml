version: '3.8'

services:
  # Code Execution Service
  code-executor:
    build:
      context: .
      dockerfile: Dockerfile.executor
    image: learning-platform-executor:latest
    container_name: learncode-executor
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - executor-workspace:/tmp/execution
    networks:
      - backend-network
    security_opt:
      - no-new-privileges:true
    read_only: true
    cap_drop:
      - ALL

networks:
  backend-network:
    driver: bridge

volumes:
  executor-workspace:
